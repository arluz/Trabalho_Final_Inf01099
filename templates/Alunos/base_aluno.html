<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Sistema CIC{% endblock %}</title>
</head>
<body style="font-family: sans-serif; padding: 20px; max-width: 800px; margin: 0 auto;">

    {% with messages = get_flashed_messages(with_categories=true) %}
      {% if messages %}
        <div class="mensagens-flash" style="margin-bottom: 20px;">
          {% for category, message in messages %}
            <div style="padding: 12px; margin-bottom: 10px; border-radius: 4px; border: 1px solid;
                        background-color: {{ '#d4edda' if category == 'success' else '#f8d7da' if category == 'danger' else '#fff3cd' }};
                        color: {{ '#155724' if category == 'success' else '#721c24' if category == 'danger' else '#856404' }};
                        border-color: {{ '#c3e6cb' if category == 'success' else '#f5c6cb' if category == 'danger' else '#ffeeba' }};">
              {{ message }}
            </div>
          {% endfor %}
        </div>
      {% endif %}
    {% endwith %}

    <main>
        {% block content %}
        {% endblock %}
        <br>
        <a href="/">Voltar a página inicial</a>
    </main>

</body>
</html>
