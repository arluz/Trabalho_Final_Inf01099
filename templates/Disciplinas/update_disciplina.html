{% extends 'base_crud.html' %}

{% block title %}Atualizar Disciplina{% endblock %}

{% block content %}

    <h1>Atualizar Disciplina</h1>
    <form method="POST" action="/disciplinas/{{ disciplina.id_disciplina }}/update">
        <label for="nome">Nome:</label>
        <input type="text" id="nome" name="nome" value="{{ disciplina.nome }}" required>
        <br><br>
        <label for="codigo">Código:</label>
        <input type="text" id="codigo" name="codigo" value="{{ disciplina.codigo }}" required>
        <br><br>
        <label for="area">Área:</label>
        <input type="text" id="area" name="area" value="{{ disciplina.area }}">
        <br><br>
        <input type="submit" value="Atualizar">
        <button type="button"
            onclick="window.location.href='/disciplinas/{{ disciplina.id_disciplina }}'">Cancelar</button>
    </form>
    <!--<a href="/disciplinas/{{ disciplina.id_disciplina }}">Cancelar</a>-->    
    <br><br>
    <a href="/disciplinas/{{ disciplina.id_disciplina }}/delete">Deletar {{ disciplina.nome }}</a>
    <br><br>
    <a href="/disciplinas">Voltar a lista de disciplinas</a>

{% endblock %}
